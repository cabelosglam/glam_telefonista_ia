<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Glam Telefonista IA</title>
    <style>
      :root { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      body { background: #0f0f12; color: #fff; display: grid; place-items: center; min-height: 100vh; margin: 0; }
      .card { background: #15161a; border: 1px solid #2a2b31; border-radius: 16px; padding: 24px; width: min(480px, 90vw); box-shadow: 0 10px 40px rgba(0,0,0,.3); }
      h1 { font-size: 20px; margin: 0 0 16px; }
      label { display: block; margin-bottom: 8px; color: #c8c8d0; font-size: 14px; }
      input[type="tel"] { width: 100%; padding: 12px 14px; font-size: 16px; border-radius: 12px; border: 1px solid #34353b; background: #0f0f12; color: #fff; outline: none; }
      .row { display: flex; gap: 8px; margin-top: 12px; }
      button { padding: 12px 16px; font-size: 16px; border-radius: 12px; border: 0; cursor: pointer; }
      .primary { background: #ff4db8; color: #0f0f12; font-weight: 700; }
      .muted { background: #2a2b31; color: #c8c8d0; }
      .hint { font-size: 12px; color: #9aa0a6; margin-top: 8px; }
      .log { margin-top: 16px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; background: #0c0c10; padding: 12px; border-radius: 12px; white-space: pre-wrap; color: #d0d0d8; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Glam Telefonista IA</h1>
      <form id="call-form">
        <label for="to">Telefone do cliente (com DDI e DDD, ex: +55XXXXXXXXXXX)</label>
        <input id="to" name="to" type="tel" placeholder="+55..." required />
        <div class="row">
          <button type="submit" class="primary">Ligar</button>
          <button type="button" id="health" class="muted">Testar servidor</button>
        </div>
        <div class="hint">A ligação é feita via Twilio Voice. Se sua conta Twilio for trial, verifique o número destino no console.</div>
      </form>
      <div class="log" id="log">Pronto para iniciar.</div>
    </div>

    <script>
      const $form = document.getElementById('call-form');
      const $log = document.getElementById('log');
      const $health = document.getElementById('health');

      $health.addEventListener('click', async () => {
        const r = await fetch('/health');
        const j = await r.json();
        $log.textContent = JSON.stringify(j, null, 2);
      });

      $form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const to = document.getElementById('to').value.trim();
        $log.textContent = 'Chamando...';
        const r = await fetch('/call', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ to })
        });
        const j = await r.json();
        $log.textContent = JSON.stringify(j, null, 2);
      });
    </script>
  </body>
</html>
